<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Session Butler</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230F1319'/><circle cx='16' cy='16' r='6' fill='%234C9A8E'/></svg>">
<style>
  /* ── Two themes. night = the terminal/file-inspector default; day = a light,
       macOS-adjacent surface. Toggled via [data-theme] on <html>. ────────── */
  :root, [data-theme="night"] {
    --bg:        #0F1319;
    --panel:     #1A2029;
    --panel-2:   #222A35;
    --sidebar:   #141A22;
    --line:      #2C3543;
    --ink:       #E6E1D6;
    --muted:     #8A94A6;
    --faint:     #5A6473;
    --live:      #4C9A8E;
    --orphan:    #C7794E;
    --danger:    #D45B5B;
    --sel:       #23405C;   /* selected row/dir wash */
    --sel-bord:  #3E7CB1;
  }
  [data-theme="day"] {
    --bg:        #FBFAF7;
    --panel:     #FFFFFF;
    --panel-2:   #F1EFEA;
    --sidebar:   #F4F2ED;
    --line:      #E2DFD7;
    --ink:       #23282F;
    --muted:     #6B7280;
    --faint:     #9AA1AC;
    --live:      #2F8074;
    --orphan:    #B4602F;
    --danger:    #C43C3C;
    --sel:       #DCE9F5;
    --sel-bord:  #2F6FB0;
  }
  * { box-sizing: border-box; }
  html { height: 100%; }
  body {
    margin: 0; height: 100%; background: var(--bg); color: var(--ink);
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", "Cascadia Code", Menlo, monospace;
    font-size: 13.5px; line-height: 1.5; -webkit-font-smoothing: antialiased;
    transition: background .2s, color .2s;
  }
  [x-cloak] { display: none !important; }
  .sans { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

  /* ── App shell: fixed masthead + two-column body ─────────────────────── */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .mast {
    display: flex; align-items: center; gap: 12px; padding: 14px 20px;
    border-bottom: 1px solid var(--line); background: var(--panel);
  }
  .logo { font-family: system-ui, sans-serif; font-weight: 700; font-size: 17px; letter-spacing: -0.02em; }
  .logo .dot { color: var(--live); }
  .spacer { flex: 1; }
  .btn {
    font: inherit; font-size: 12.5px; color: var(--muted); background: var(--panel);
    border: 1px solid var(--line); border-radius: 6px; padding: 6px 11px; cursor: pointer; transition: .12s;
  }
  .btn:hover { color: var(--ink); border-color: var(--faint); background: var(--panel-2); }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
  .btn-danger:hover { filter: brightness(.92); color: #fff; }

  .body { flex: 1; display: flex; min-height: 0; }

  /* ── Sidebar (Discovered) ────────────────────────────────────────────── */
  .side { width: 320px; flex: none; background: var(--sidebar); border-right: 1px solid var(--line); overflow-y: auto; }
  .side-head { padding: 16px 16px 12px; position: sticky; top: 0; background: var(--sidebar); border-bottom: 1px solid var(--line); }
  .side-title { font-family: system-ui, sans-serif; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 7px; }
  .agents { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-size: 11px; color: var(--muted); background: var(--panel-2); border: 1px solid var(--line); border-radius: 20px; padding: 2px 10px; }
  .rollup { margin-top: 11px; font-size: 12px; color: var(--muted); }
  .rollup .orphan { color: var(--orphan); display: block; margin-top: 3px; }
  .side-search { width: 100%; margin-top: 11px; background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 7px 10px; color: var(--ink); font: inherit; font-size: 12.5px; }
  .side-search:focus { outline: none; border-color: var(--live); }

  .dir { padding: 9px 16px; cursor: pointer; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; }
  .dir:hover { background: var(--panel-2); }
  .dir.sel { background: var(--sel); border-left-color: var(--sel-bord); }
  .dir.orphan { border-left-color: var(--orphan); }
  .dir.orphan.sel { border-left-color: var(--sel-bord); }
  .dir .ic { color: var(--faint); flex: none; }
  .dir-txt { min-width: 0; flex: 1; }
  .dir-name { font-size: 13px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dir-path { font-size: 11px; color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: rtl; text-align: left; }
  .dir-badge { font-size: 11px; color: var(--muted); background: var(--panel-2); border-radius: 10px; padding: 1px 8px; flex: none; }
  .dir.sel .dir-badge { background: var(--sel-bord); color: #fff; }
  .mini-missing { color: var(--orphan); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }

  /* ── Detail pane ─────────────────────────────────────────────────────── */
  .detail { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
  .detail-head { padding: 18px 22px 12px; border-bottom: 1px solid var(--line); }
  .dh-title { font-family: system-ui, sans-serif; font-size: 19px; font-weight: 600; display: flex; align-items: center; gap: 9px; }
  .dh-sub { color: var(--muted); font-size: 12.5px; margin-top: 4px; }
  .dh-actions { margin-top: 12px; display: flex; align-items: center; gap: 10px; }
  .badge { font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--orphan); border: 1px solid var(--orphan); border-radius: 4px; padding: 1px 6px; }

  .tbl-wrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { text-align: left; padding: 9px 14px; white-space: nowrap; }
  thead th {
    position: sticky; top: 0; background: var(--panel); color: var(--faint); font-weight: 500;
    text-transform: uppercase; letter-spacing: .06em; font-size: 10.5px; cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--line);
  }
  thead th.nosort { cursor: default; }
  thead th:hover:not(.nosort) { color: var(--muted); }
  th .arrow { color: var(--live); margin-left: 4px; }
  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:hover { background: var(--panel-2); }
  tbody tr.sel { background: var(--sel); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
  td.title { max-width: 420px; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
  td.id, td.agent { color: var(--muted); }
  .lock { color: var(--live); }
  .ck { accent-color: var(--sel-bord); cursor: pointer; }
  .rowdel { color: var(--faint); background: none; border: none; cursor: pointer; font: inherit; padding: 2px 6px; border-radius: 4px; }
  .rowdel:hover { color: var(--danger); }
  .rowdel:disabled { opacity: .35; cursor: not-allowed; }

  .placeholder, .loading { color: var(--muted); text-align: center; padding: 64px 20px; }

  /* ── Confirm dialog ──────────────────────────────────────────────────── */
  .scrim { position: fixed; inset: 0; background: rgba(6,9,13,.6); display: grid; place-items: center; padding: 20px; }
  .dialog { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 24px; max-width: 460px; width: 100%; }
  .dialog h2 { margin: 0 0 8px; font-family: system-ui, sans-serif; font-size: 17px; }
  .dialog p { color: var(--muted); font-size: 13px; margin: 0 0 6px; }
  .dialog .target { color: var(--ink); word-break: break-all; }
  .dialog-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .err { color: var(--danger); font-size: 12.5px; margin-top: 10px; white-space: pre-line; }

  @media (max-width: 720px) {
    .side { width: 200px; }
    td.id, th.c-id, td.agent, th.c-agent { display: none; }
  }
</style>
</head>
<body>
<div class="app" x-data="butler()" x-init="load()" x-cloak>

  <div class="mast">
    <span class="logo">Agent Session Butler<span class="dot">.</span></span>
    <span class="spacer"></span>
    <button class="btn" @click="toggleTheme()" x-text="theme === 'night' ? '☾ night' : '☀ day'" title="Toggle theme"></button>
    <button class="btn" @click="load()" :disabled="loading" x-text="loading ? 'scanning…' : '↻ rescan'"></button>
  </div>

  <div class="body">

    <!-- ── Sidebar ── -->
    <aside class="side">
      <div class="side-head">
        <div class="side-title sans">🔍 Discovered</div>
        <div class="agents">
          <template x-for="a in (summary?.agents || [])" :key="a"><span class="chip" x-text="a"></span></template>
        </div>
        <div class="rollup" x-show="summary">
          <span x-text="`${summary?.totalCount ?? 0} sessions · ${human(summary?.totalSize)} · ${summary?.totalGroups ?? 0} dirs`"></span>
          <span class="orphan" x-show="summary?.orphanCount > 0"
                x-text="`🗂 ${summary?.orphanCount ?? 0} orphaned (${human(summary?.orphanSize)} reclaimable)`"></span>
        </div>
        <input class="side-search" type="search" placeholder="Filter directories…" x-model="dirQuery">
      </div>

      <template x-for="g in filteredGroups()" :key="g.cwd">
        <div class="dir" :class="{ sel: selectedCwd === g.cwd, orphan: g.orphan }" @click="selectDir(g)">
          <span class="ic">📁</span>
          <div class="dir-txt">
            <div class="dir-name" x-text="g.displayName || g.cwd"></div>
            <div class="dir-path" x-text="g.cwd"></div>
            <span class="mini-missing" x-show="g.orphan">missing</span>
          </div>
          <span class="dir-badge" x-text="g.sessionCount"></span>
        </div>
      </template>
    </aside>

    <!-- ── Detail ── -->
    <main class="detail">
      <template x-if="!selected">
        <div class="placeholder" x-show="summary" x-text="summary?.totalGroups ? 'Select a directory to view its sessions.' : 'No sessions found.'"></div>
      </template>

      <template x-if="selected">
        <div style="display:flex;flex-direction:column;min-height:0;flex:1">
          <div class="detail-head">
            <div class="dh-title sans">
              <span x-text="selected.displayName || selected.cwd"></span>
              <span class="badge" x-show="selected.orphan">missing</span>
            </div>
            <div class="dh-sub" x-text="`${selected.cwd} · ${selected.sessionCount} sessions · ${selected.totalSizeHuman}`"></div>
            <div class="dh-actions">
              <button class="btn" @click="toggleSelectAll()" x-text="allSelected() ? 'Deselect all' : 'Select all'"></button>
              <button class="btn btn-danger" x-show="selectedIds.size > 0" @click="askDeleteSelected()"
                      x-text="`Delete ${selectedIds.size} selected`"></button>
            </div>
          </div>

          <div class="tbl-wrap">
            <table>
              <thead><tr>
                <th class="nosort" style="width:34px"><input type="checkbox" class="ck" :checked="allSelected()" @change="toggleSelectAll()"></th>
                <th @click="sortBy('title')">Title <span class="arrow" x-show="sort.key==='title'" x-text="arrow()"></span></th>
                <th class="c-agent" @click="sortBy('agent')">Agent <span class="arrow" x-show="sort.key==='agent'" x-text="arrow()"></span></th>
                <th class="num" @click="sortBy('messageCount')">Messages <span class="arrow" x-show="sort.key==='messageCount'" x-text="arrow()"></span></th>
                <th class="num" @click="sortBy('fileSize')">Size <span class="arrow" x-show="sort.key==='fileSize'" x-text="arrow()"></span></th>
                <th @click="sortBy('modifiedAt')">Modified <span class="arrow" x-show="sort.key==='modifiedAt'" x-text="arrow()"></span></th>
                <th class="c-id" @click="sortBy('id')">Session ID <span class="arrow" x-show="sort.key==='id'" x-text="arrow()"></span></th>
                <th class="nosort"></th>
              </tr></thead>
              <tbody>
                <template x-for="s in sortedSessions()" :key="s.id">
                  <tr :class="{ sel: selectedIds.has(s.id) }">
                    <td><input type="checkbox" class="ck" :checked="selectedIds.has(s.id)" :disabled="s.locked" @change="toggleRow(s)"></td>
                    <td class="title" :title="s.title">
                      <span class="lock" x-show="s.locked" title="Held by a running agent">🔒 </span><span x-text="s.title"></span>
                    </td>
                    <td class="agent c-agent" x-text="s.agent"></td>
                    <td class="num" x-text="s.messageCount != null ? s.messageCount + ' msgs' : '·'"></td>
                    <td class="num" x-text="s.sizeHuman"></td>
                    <td x-text="fmtDate(s.modifiedAt)"></td>
                    <td class="id c-id" x-text="shortId(s.id)"></td>
                    <td style="text-align:right">
                      <button class="rowdel" :disabled="s.locked" @click="askDeleteOne(s)" title="Delete">🗑</button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </template>
    </main>
  </div>

  <!-- Confirm delete (single or batch) -->
  <template x-if="pending">
    <div class="scrim" @click.self="pending=null">
      <div class="dialog">
        <h2 x-text="pending.ids.length > 1 ? `Delete ${pending.ids.length} sessions?` : 'Delete this session?'"></h2>
        <p>This permanently removes the files on disk. It can't be undone.</p>
        <p class="target" x-show="pending.ids.length === 1" x-text="pending.label"></p>
        <p x-show="pending.ids.length > 1" x-text="pending.label"></p>
        <div class="err" x-show="delError" x-text="delError"></div>
        <div class="dialog-actions">
          <button class="btn" @click="pending=null" :disabled="deleting">Cancel</button>
          <button class="btn btn-danger" @click="confirmDelete()" :disabled="deleting"
                  x-text="deleting ? 'deleting…' : 'Delete permanently'"></button>
        </div>
      </div>
    </div>
  </template>

</div>

<script src="alpine.min.js" defer></script>
<script>
function butler() {
  return {
    summary: null, loading: false, dirQuery: '',
    selectedCwd: null, enriched: {},
    selectedIds: new Set(),
    sort: { key: 'modifiedAt', dir: 'desc' },
    pending: null, deleting: false, delError: '',
    theme: 'night',

    init() {
      const saved = localStorage.getItem('asb-theme');
      this.theme = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'day' : 'night');
      document.documentElement.setAttribute('data-theme', this.theme);
    },
    toggleTheme() {
      this.theme = this.theme === 'night' ? 'day' : 'night';
      document.documentElement.setAttribute('data-theme', this.theme);
      localStorage.setItem('asb-theme', this.theme);
    },

    async load() {
      this.loading = true;
      try {
        const r = await fetch('/api/groups');
        this.summary = await r.json();
        this.enriched = {};
        // Keep the current selection if that cwd still exists.
        if (this.selectedCwd && !this.summary.groups.some(g => g.cwd === this.selectedCwd)) {
          this.selectedCwd = null;
        }
        if (this.selected) this.selectDir(this.selected); // re-enrich
      } finally { this.loading = false; }
    },

    get selected() { return (this.summary?.groups || []).find(g => g.cwd === this.selectedCwd) || null; },

    human(n) {
      if (n == null) return '—';
      const u = ['B','KiB','MiB','GiB','TiB']; let i = 0, x = n;
      while (x >= 1024 && i < u.length-1) { x /= 1024; i++; }
      return (i === 0 ? x : x.toFixed(1)) + ' ' + u[i];
    },
    fmtDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString(undefined, { year:'numeric', month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    },
    shortId(id) { return id.length > 8 ? id.slice(0, 8) : id; },

    filteredGroups() {
      let gs = this.summary?.groups || [];
      const q = this.dirQuery.trim().toLowerCase();
      if (q) gs = gs.filter(g => g.cwd.toLowerCase().includes(q));
      return gs;
    },

    async selectDir(g) {
      this.selectedCwd = g.cwd;
      this.selectedIds = new Set();
      if (!this.enriched[g.cwd]) {
        this.enriched[g.cwd] = true;
        try {
          const r = await fetch('/api/enrich', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ cwd: g.cwd }) });
          if (r.ok) {
            const fresh = await r.json();
            const idx = this.summary.groups.findIndex(x => x.cwd === g.cwd);
            if (idx >= 0) this.summary.groups[idx].sessions = fresh.sessions;
          }
        } catch (_) { this.enriched[g.cwd] = false; }
      }
    },

    sortBy(key) {
      if (this.sort.key === key) this.sort.dir = this.sort.dir === 'asc' ? 'desc' : 'asc';
      else this.sort = { key, dir: key === 'title' || key === 'agent' || key === 'id' ? 'asc' : 'desc' };
    },
    arrow() { return this.sort.dir === 'asc' ? '▲' : '▼'; },
    sortedSessions() {
      const list = [...(this.selected?.sessions || [])];
      const { key, dir } = this.sort;
      list.sort((a, b) => {
        let av = a[key], bv = b[key];
        if (key === 'modifiedAt') { av = new Date(av).getTime(); bv = new Date(bv).getTime(); }
        else if (key === 'messageCount' || key === 'fileSize') { av = av ?? -1; bv = bv ?? -1; }
        else { av = String(av ?? '').toLowerCase(); bv = String(bv ?? '').toLowerCase(); }
        if (av < bv) return dir === 'asc' ? -1 : 1;
        if (av > bv) return dir === 'asc' ? 1 : -1;
        return 0;
      });
      return list;
    },

    deletableSessions() { return (this.selected?.sessions || []).filter(s => !s.locked); },
    allSelected() { const d = this.deletableSessions(); return d.length > 0 && d.every(s => this.selectedIds.has(s.id)); },
    toggleSelectAll() {
      if (this.allSelected()) this.selectedIds = new Set();
      else this.selectedIds = new Set(this.deletableSessions().map(s => s.id));
    },
    toggleRow(s) {
      const next = new Set(this.selectedIds);
      next.has(s.id) ? next.delete(s.id) : next.add(s.id);
      this.selectedIds = next;
    },

    askDeleteOne(s) {
      this.delError = '';
      this.pending = { ids: [s.id], label: s.title + '  (' + s.agent + ' · ' + s.sizeHuman + ')' };
    },
    askDeleteSelected() {
      const ids = [...this.selectedIds];
      if (!ids.length) return;
      this.delError = '';
      this.pending = { ids, label: `${ids.length} sessions from ${this.selected.displayName || this.selected.cwd}` };
    },
    async confirmDelete() {
      if (!this.pending) return;
      this.deleting = true; this.delError = '';
      const failed = [];
      for (const id of this.pending.ids) {
        try {
          const r = await fetch('/api/session/' + encodeURIComponent(id), { method: 'DELETE' });
          if (r.status === 204) this.applyDeleted(id);
          else { const b = await r.json().catch(() => ({})); failed.push(`${this.shortId(id)}: ${b.error || r.status}`); }
        } catch (_) { failed.push(`${this.shortId(id)}: network error`); }
      }
      this.deleting = false;
      if (failed.length) this.delError = 'Some deletes failed:\n' + failed.join('\n');
      else this.pending = null;
    },

    // Remove a deleted session locally and keep the rollup + selection truthful.
    applyDeleted(id) {
      const g = this.summary.groups.find(x => (x.sessions || []).some(s => s.id === id));
      if (!g) return;
      const s = g.sessions.find(x => x.id === id);
      g.sessions = g.sessions.filter(x => x.id !== id);
      g.sessionCount = Math.max(0, g.sessionCount - 1);
      g.totalSize -= s.fileSize; g.totalSizeHuman = this.human(g.totalSize);
      this.summary.totalCount--; this.summary.totalSize -= s.fileSize;
      if (g.orphan) this.summary.orphanSize -= s.fileSize;
      const sel = new Set(this.selectedIds); sel.delete(id); this.selectedIds = sel;
      if (g.sessionCount === 0) {
        this.summary.groups = this.summary.groups.filter(x => x.cwd !== g.cwd);
        this.summary.totalGroups--;
        if (g.orphan) this.summary.orphanCount--;
        if (this.selectedCwd === g.cwd) this.selectedCwd = null;
      }
    },
  };
}
</script>
</body>
</html>
